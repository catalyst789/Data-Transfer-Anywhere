# coturn TURN server configuration
# Replace YOUR_SERVER_IP and credentials before deploying to production

listening-port=3478
tls-listening-port=5349

# Set to your server's public IP
external-ip=YOUR_SERVER_IP

# Relay port range — keep this range open in your firewall (UDP)
min-port=49152
max-port=65535

# Credentials for WebRTC clients
# Must match what you configure in ICE_CONFIG on the client
realm=datatransfer.example.com
user=turnuser:changeme-strong-password

# Logging
log-file=/var/log/coturn/turnserver.log
verbose

# Security
fingerprint
lt-cred-mech
no-multicast-peers
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=::1
denied-peer-ip=fe80::-febf:ffff:ffff:ffff:ffff:ffff:ffff:ffff
